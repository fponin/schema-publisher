name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          mkdir -p dist
          GOOS=darwin GOARCH=amd64 go build -ldflags "-X github.com/fponin/hpub/cmd.Version=${{ github.ref_name }}" -o dist/hpub-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -ldflags "-X github.com/fponin/hpub/cmd.Version=${{ github.ref_name }}" -o dist/hpub-darwin-arm64 .

      - name: Generate defaults.yaml
        run: |
          cat > dist/defaults.yaml << 'EOF'
          # =============================================================
          # hpub — GraphQL subgraph schema publisher
          #
          # INSTALL
          #   sudo cp hpub /usr/local/bin/ && sudo chmod +x /usr/local/bin/hpub && hpub config init
          #
          # PREREQUISITES
          #   kubectl   — https://kubernetes.io/docs/tasks/tools/
          #   rover     — https://rover.apollo.dev
          #   hive CLI  — npm install -g @graphql-hive/cli@0.42.1  (only 0.42.1 works stably)
          #
          # USAGE
          #   hpub run                            interactive wizard
          #   hpub run --schema ./schema.graphql  use existing schema file
          #   hpub run --env dev                  skip env selection
          #   hpub check --schema ./schema.graphql  check only, no publish
          #   hpub config show                    print current config
          #   hpub config edit                    open config in $EDITOR
          # =============================================================

          # Fill in your real values below.

          defaults:
            schemaFile: "~/new.graphql"
            hiveEndpoint: "https://hive.example.com/graphql"

          environments:
            dev:
              authUrl: "https://auth.example.com/dshop/auth"
              authBearerToken: "change-me"
              defaultLocalPort: 8080
              jwtHeader: "jwt-token"
            stage:
              authUrl: "https://auth-stage.example.com/dshop/auth"
              authBearerToken: "change-me"
              defaultLocalPort: 8080
              jwtHeader: "jwt-token"
            prod:
              authUrl: "https://auth-prod.example.com/dshop/auth"
              authBearerToken: "change-me"
              defaultLocalPort: 8080
              jwtHeader: "jwt-token"

          subgraphs:
            - name: test
              publishUrl: "http://test-service:8080/graphql"
              k8sResource: "svc/test-service"
              namespace: default
              remotePort: 8080
              graphqlPath: "/graphql"
          EOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/hpub-darwin-amd64
            dist/hpub-darwin-arm64
            dist/defaults.yaml
